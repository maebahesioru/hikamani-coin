services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://hikamani:hikamani@db:5432/hikamani_coin
      - REDIS_URL=redis://redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=true
      - AUTH_DISCORD_ID=${AUTH_DISCORD_ID}
      - AUTH_DISCORD_SECRET=${AUTH_DISCORD_SECRET}
      - ADMIN_USER_ID=${ADMIN_USER_ID:-}
      - ELECTRUM_RPC_URL=${ELECTRUM_RPC_URL:-http://localhost:7777}
      - ELECTRUM_RPC_USER=${ELECTRUM_RPC_USER:-user}
      - ELECTRUM_RPC_PASS=${ELECTRUM_RPC_PASS:-pass}
      - LTC_RATE_API=https://api.coingecko.com/api/v3/simple/price?ids=litecoin&vs_currencies=jpy
      - HKM_PER_JPY=100
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hikamani
      POSTGRES_PASSWORD: hikamani
      POSTGRES_DB: hikamani_coin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hikamani -d hikamani_coin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  cron:
    image: alpine:3.19
    depends_on:
      - app
    environment:
      - CRON_SECRET=${CRON_SECRET:-hikamani-cron-secret}
      - APP_URL=http://app:3000
    command: >
      sh -c "
        echo '*/5 * * * * wget -qO- --header=\"x-cron-secret: $$CRON_SECRET\" $$APP_URL/api/cron?type=prices > /proc/1/fd/1 2>&1
*/15 * * * * wget -qO- --header=\"x-cron-secret: $$CRON_SECRET\" $$APP_URL/api/cron?type=profiles > /proc/1/fd/1 2>&1' | crontab - &&
        crond -f -l 2
      "

volumes:
  pgdata:
  redisdata:
